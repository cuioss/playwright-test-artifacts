# Configuration is read from .github/project.yml - no inputs needed!
name: npm Build

on:
  push:
    branches: [main, "feature/*", "fix/*", "chore/*", "dependabot/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    uses: cuioss/cuioss-organization/.github/workflows/reusable-npm-build.yml@0af17b4211b2db37c3bc9b5f316f0c534c3ee8d5 # v0.6.8
